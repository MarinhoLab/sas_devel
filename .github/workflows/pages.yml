name: pages.yml
on: [push, workflow_dispatch]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Download and extract doxygen
        run: |
          curl -OL https://www.doxygen.nl/files/doxygen-1.17.0.linux.bin.tar.gz
          tar -xvzf doxygen-1.17.0.linux.bin.tar.gz
          ln -s doxygen-1.17.0/bin/doxygen doxygen
      - name: Build HTML Assets
        run: ./doxygen
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

